<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <style>
    /* ---------- Theme tokens ---------- */
    :root {
      --bg: #f4f5f8; --surface: #ffffff; --surface-2: #fafafbff;
      --text: #1b1b24; --muted: #83838f; --faint: #a9aab5;
      --border: #e8e8ef; --hover: #f1f1fb;
      --header-bg: #1a1a2e; --header-text: #ffffff; --header-sub: #9a9ab0;
      --accent: #6c5cff; --accent-weak: #eef0ff;
      --green: #2ecc71; --danger: #e74c3c; --switch-off: #cfcfd8;
      --field: #ffffff; --shadow: 0 1px 8px rgba(20,20,40,.08);
      --coffee: #c0860b; --scroll: #d6d6e0;
    }
    [data-theme="dark"] {
      --bg: #14151c; --surface: #1e2029; --surface-2: #191a22;
      --text: #e8e9f0; --muted: #9a9bb0; --faint: #6b6c7e;
      --border: #2b2d3a; --hover: #262838;
      --header-bg: #101019; --header-text: #ffffff; --header-sub: #9a9ab0;
      --accent: #8b80ff; --accent-weak: #23243a;
      --green: #2ecc71; --danger: #ff7070; --switch-off: #3a3c4a;
      --field: #14151c; --shadow: 0 2px 10px rgba(0,0,0,.45);
      --coffee: #e6b53c; --scroll: #3a3c4a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Avoid the theme "flash": keep the popup hidden until the stored theme is
       applied (added as .cf-ready in popup.js), so the light→dark switch never
       paints. Transitions are likewise gated so the first paint is instant and
       only later user toggles animate. */
    html { visibility: hidden; }
    html.cf-ready { visibility: visible; }

    /* Discreet, theme-matched scrollbars (main view + About overlay), so the
       chunky bright OS scrollbar doesn't glow in dark mode. */
    html, .about-overlay { scrollbar-width: thin; scrollbar-color: var(--scroll) transparent; }
    html::-webkit-scrollbar, .about-overlay::-webkit-scrollbar { width: 9px; }
    html::-webkit-scrollbar-track, .about-overlay::-webkit-scrollbar-track { background: transparent; }
    html::-webkit-scrollbar-thumb, .about-overlay::-webkit-scrollbar-thumb {
      background: var(--scroll); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box;
    }
    html::-webkit-scrollbar-thumb:hover, .about-overlay::-webkit-scrollbar-thumb:hover {
      background: var(--faint); background-clip: padding-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    html.cf-ready body { transition: background .2s, color .2s; }

    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .header-left h1 { font-size: 15px; font-weight: 800; letter-spacing: -.2px; }
    .header-left p  { font-size: 11px; color: var(--header-sub); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,.12); border: none; color: #fff; cursor: pointer;
      width: 28px; height: 28px; border-radius: 8px; font-size: 14px; line-height: 1;
      display: inline-flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.22); }
    /* Language dropdown (custom, so it can show SVG flags) */
    .lang-dd { position: relative; }
    .lang-trigger {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.12); color: #fff; border: none; border-radius: 8px;
      font-size: 11px; padding: 5px 8px; cursor: pointer; outline: none; transition: background .15s;
    }
    .lang-trigger:hover { background: rgba(255,255,255,.22); }
    .lang-trigger .caret { font-size: 8px; opacity: .75; }
    .lang-menu {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 60; margin: 0;
      list-style: none; padding: 4px; min-width: 124px; max-height: 256px; overflow-y: auto;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow);
      scrollbar-width: thin; scrollbar-color: var(--scroll) transparent;
    }
    .lang-menu::-webkit-scrollbar { width: 8px; }
    .lang-menu::-webkit-scrollbar-track { background: transparent; }
    .lang-menu::-webkit-scrollbar-thumb {
      background: var(--scroll); border-radius: 8px;
      border: 2px solid transparent; background-clip: padding-box;
    }
    .lang-menu::-webkit-scrollbar-thumb:hover { background: var(--faint); background-clip: padding-box; }
    .lang-menu[hidden] { display: none; }
    .lang-opt {
      display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
      padding: 7px 9px; border: none; border-radius: 7px; background: none; cursor: pointer;
      color: var(--text); font-size: 12px; white-space: nowrap;
    }
    .lang-opt:hover { background: var(--hover); }
    .lang-opt.sel { background: var(--accent-weak); color: var(--accent); font-weight: 600; }

    /* Shared flag tile */
    .flag {
      width: 20px; height: 13px; flex-shrink: 0; border-radius: 3px; overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,.14) inset; display: block;
    }
    .flag svg { display: block; width: 100%; height: 100%; }

    .stat-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted);
    }
    .stat-bar strong { font-size: 18px; font-weight: 700; color: var(--text); }
    .stat-bar .reset {
      margin-left: auto; font-size: 11px; color: var(--faint); cursor: pointer;
      background: none; border: none; padding: 2px 4px; border-radius: 5px;
    }
    .stat-bar .reset:hover { color: var(--danger); }

    .master-row {
      background: var(--surface); border-bottom: 1px solid var(--border); padding: 11px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .master-label { font-weight: 600; font-size: 13px; }
    .master-label.off { color: var(--faint); font-weight: 500; }

    .section-header {
      padding: 12px 16px 6px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; color: var(--faint);
    }

    .cat-list { padding: 0 12px 2px; }
    .empty-cats { padding: 2px 16px 8px; font-size: 12px; color: var(--muted); line-height: 1.5; }
    .cat-card {
      background: var(--surface); border-radius: 10px; margin-bottom: 7px;
      border: 1px solid var(--border); overflow: hidden; transition: box-shadow .15s, border-color .15s;
    }
    .cat-card:hover { box-shadow: var(--shadow); }
    .cat-header { display: flex; align-items: center; padding: 11px 12px; gap: 9px; cursor: pointer; user-select: none; }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; font-weight: 600; font-size: 13px; }
    .cat-count { font-size: 11px; color: var(--faint); margin-right: 4px; }
    .cat-chevron { font-size: 10px; color: var(--faint); transition: transform .2s; margin-right: 4px; }
    .cat-card.open .cat-chevron { transform: rotate(180deg); }
    .cat-body { display: none; border-top: 1px solid var(--border); padding: 11px 12px; background: var(--surface-2); }
    .cat-card.open .cat-body { display: block; }
    .words-area {
      width: 100%; height: 80px; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 12px; font-family: inherit; resize: vertical;
      background: var(--field); color: var(--text); line-height: 1.5; outline: none; transition: border-color .15s;
    }
    .words-area:focus { border-color: var(--accent); }
    .words-hint { font-size: 10px; color: var(--faint); margin-top: 5px; line-height: 1.4; }
    .cat-actions { display: flex; justify-content: space-between; margin-top: 9px; }
    .btn-save {
      background: var(--accent); color: #fff; border: none; border-radius: 7px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: filter .15s;
    }
    .btn-save:hover { filter: brightness(1.08); }
    .btn-delete {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      padding: 6px 11px; font-size: 12px; color: var(--danger); cursor: pointer;
    }
    .btn-delete:hover { border-color: var(--danger); }

    /* SUGGESTED TOPIC PRESETS — vertical list of full-width rows */
    .preset-list { display: flex; flex-direction: column; gap: 6px; padding: 0 12px 6px; }
    .preset-chip {
      display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
      padding: 9px 11px; font-size: 12px; cursor: pointer; color: var(--text); transition: .12s;
    }
    .preset-chip:hover { border-color: var(--accent); background: var(--accent-weak); }
    .preset-chip .pdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .preset-chip .picon { display: flex; flex-shrink: 0; }
    .preset-chip .picon svg { width: 18px; height: 18px; display: block; }
    .preset-chip .pname { flex: 1; font-weight: 500; }
    .preset-chip .pplus { color: var(--green); font-weight: 700; font-size: 16px; line-height: 1; }
    .preset-empty { padding: 0 16px 6px; font-size: 11px; color: var(--faint); font-style: italic; }

    .add-section { padding: 4px 12px 12px; }
    .add-row { display: flex; gap: 7px; }
    .add-name-input {
      flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
      font-size: 12px; font-family: inherit; outline: none; background: var(--field); color: var(--text);
      transition: border-color .15s;
    }
    .add-name-input:focus { border-color: var(--accent); }
    .btn-add {
      background: var(--green); color: #fff; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { filter: brightness(1.05); }

    /* EXCLUDED SITES */
    .excl-section { padding: 0 12px 14px; }
    .btn-excl-current {
      width: 100%; background: var(--surface); border: 1px dashed var(--border); border-radius: 9px;
      padding: 10px; font-size: 12px; font-weight: 500; color: var(--muted);
      cursor: pointer; margin-bottom: 8px; transition: .15s;
    }
    .btn-excl-current:hover { background: var(--hover); border-color: var(--accent); color: var(--text); }
    .excl-list { display: flex; flex-direction: column; gap: 6px; }
    .excl-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px;
    }
    .excl-domain { font-size: 12px; color: var(--text); word-break: break-all; }
    .excl-remove {
      background: none; border: none; color: var(--faint); cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0 2px; flex-shrink: 0;
    }
    .excl-remove:hover { color: var(--danger); }
    .excl-empty { font-size: 11px; color: var(--faint); font-style: italic; padding: 2px 2px 6px; }

    /* TOGGLE SWITCH */
    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: var(--switch-off); border-radius: 22px; transition: .2s; cursor: pointer; }
    .slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: var(--green); }
    input:checked + .slider::before { transform: translateX(18px); }

    .saved-flash { font-size: 11px; color: var(--green); margin-left: 6px; opacity: 0; transition: opacity .3s; }
    .saved-flash.show { opacity: 1; }

    /* REVEAL ON PAGE */
    .page-row { background: var(--surface); border-bottom: 1px solid var(--border); padding: 9px 16px; }
    .btn-reveal {
      width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
      padding: 9px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: .15s;
    }
    .btn-reveal:hover:not(:disabled) { background: var(--hover); border-color: var(--accent); }
    .btn-reveal:disabled { color: var(--faint); cursor: default; }
    .btn-reveal.active { background: var(--accent-weak); border-color: var(--accent); color: var(--accent); }

    /* BACKUP */
    .backup-section { padding: 4px 12px 12px; }
    .backup-row { display: flex; gap: 7px; }
    .btn-backup {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: .15s;
    }
    .btn-backup:hover { background: var(--hover); border-color: var(--accent); color: var(--text); }
    .backup-msg { font-size: 11px; margin-top: 7px; min-height: 14px; }
    .backup-msg.ok { color: var(--green); }
    .backup-msg.err { color: var(--danger); }

    /* FOOTER — slim & sticky, always visible */
    .footer {
      position: sticky; bottom: 0; z-index: 5;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 6px 10px; border-top: 1px solid var(--border); background: var(--surface);
      box-shadow: 0 -3px 10px rgba(0,0,0,.05);
    }
    .foot-btn {
      display: inline-flex; align-items: center; gap: 6px; background: none; border: none;
      color: var(--muted); font-size: 11.5px; cursor: pointer; padding: 5px 8px; border-radius: 7px; transition: .12s;
    }
    .foot-btn:hover { color: var(--accent); background: var(--hover); }
    .foot-btn svg { width: 15px; height: 15px; display: block; flex-shrink: 0; }
    .foot-btn.coffee svg { color: var(--coffee); }
    .foot-btn.coffee:hover svg { filter: brightness(1.08); }

    /* ABOUT OVERLAY */
    .about-overlay { background: var(--bg); display: flex; flex-direction: column; padding: 16px 18px 20px; min-height: 440px; }
    .about-overlay[hidden] { display: none; }
    .about-close { align-self: flex-end; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
    .about-icon { width: 66px; height: 66px; border-radius: 16px; margin: 4px auto 12px; display: block; box-shadow: var(--shadow); }
    .about-name { text-align: center; font-size: 21px; font-weight: 800; letter-spacing: -.3px; }
    .about-ver { text-align: center; color: var(--faint); font-size: 12px; margin-top: 3px; }
    .about-tag { text-align: center; color: var(--text); font-size: 13px; margin-top: 12px; line-height: 1.5; }
    .about-desc { text-align: center; color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.55; padding: 0 6px; }
    .about-foss { text-align: center; color: var(--faint); font-size: 11px; margin-top: 8px; }
    .about-links { margin-top: auto; display: flex; flex-direction: column; gap: 9px; padding-top: 18px; }
    .about-link {
      display: flex; align-items: center; justify-content: center; gap: 9px; padding: 11px;
      border: 1px solid var(--border); border-radius: 11px; background: var(--surface); color: var(--text);
      font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; transition: .12s;
    }
    .about-link:hover { border-color: var(--accent); background: var(--hover); }
    .about-link svg { width: 18px; height: 18px; }
    .about-coffee svg { color: var(--coffee); }
    .about-coffee:hover svg { filter: brightness(1.08); }
  </style>
</head>
<body>

<div id="mainView">
<div class="header">
  <div class="header-left">
    <h1>ClearFeed</h1>
    <p data-i18n="tagline">Focus on what matters to you</p>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="themeBtn" title="Theme">🌙</button>
    <div class="lang-dd" id="langDd">
      <button class="lang-trigger" id="langTrigger" type="button" title="Language" aria-haspopup="listbox" aria-expanded="false"></button>
      <ul class="lang-menu" id="langMenu" role="listbox" hidden></ul>
    </div>
  </div>
</div>

<div class="stat-bar">
  <strong id="count">0</strong>
  <span data-i18n="articlesHidden">items hidden</span>
  <button class="reset" id="resetBtn" data-i18n="reset" title="reset">reset</button>
</div>

<div class="master-row">
  <span class="master-label" id="masterLabel">Filtering on</span>
  <label class="switch">
    <input type="checkbox" id="masterToggle"/>
    <span class="slider"></span>
  </label>
</div>

<div class="page-row">
  <button class="btn-reveal" id="revealBtn" disabled>Nothing hidden on this page</button>
</div>

<div class="section-header" data-i18n="categories">Your topics</div>
<div class="cat-list" id="catList"></div>
<div class="empty-cats" id="emptyCats" data-i18n="emptyCats" hidden></div>

<div class="section-header" data-i18n="suggested">Suggested topics</div>
<div class="preset-list" id="presetList"></div>

<div class="section-header" data-i18n="addCategory">Add your own</div>
<div class="add-section">
  <div class="add-row">
    <input type="text" class="add-name-input" id="newCatName" data-i18n-ph="catNamePlaceholder" placeholder="Topic name…" maxlength="30"/>
    <button class="btn-add" id="addCatBtn" data-i18n="add">Add</button>
  </div>
</div>

<div class="section-header" data-i18n="excludedHeader">Never filter on these sites</div>
<div class="excl-section">
  <button class="btn-excl-current" id="exclCurrentBtn" data-i18n="excludeCurrent">Don't filter the site I'm on</button>
  <div class="excl-list" id="exclList"></div>
  <div class="add-row" style="margin-top:7px">
    <input type="text" class="add-name-input" id="newExclDomain" data-i18n-ph="exclPlaceholder" placeholder="e.g. mybank.com" maxlength="80"/>
    <button class="btn-add" id="addExclBtn" data-i18n="add">Add</button>
  </div>
</div>

<div class="section-header" data-i18n="backup">Backup</div>
<div class="backup-section">
  <div class="backup-row">
    <button class="btn-backup" id="exportBtn" data-i18n="export">Export</button>
    <button class="btn-backup" id="importBtn" data-i18n="import">Import</button>
  </div>
  <input type="file" id="importFile" accept="application/json,.json" hidden/>
  <div class="backup-msg" id="backupMsg"></div>
</div>

<div class="footer">
  <button class="foot-btn" id="aboutBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="11" x2="12" y2="16"/><line x1="12" y1="8" x2="12.01" y2="8"/>
    </svg>
    <span data-i18n="about">About</span>
  </button>
  <button class="foot-btn coffee" id="coffeeBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
      <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
    </svg>
    <span data-i18n="coffee">Buy me a coffee</span>
  </button>
</div>
</div><!-- /mainView -->

<!-- About panel (replaces the main view; not an overlay, so the window never scrolls behind it) -->
<div class="about-overlay" id="aboutPanel" hidden>
  <button class="about-close" id="aboutClose" title="Close">✕</button>
  <img class="about-icon" src="icon128.png" alt="ClearFeed"/>
  <div class="about-name">ClearFeed</div>
  <div class="about-ver" id="aboutVer"></div>
  <p class="about-tag" data-i18n="tagline">Focus on what matters to you</p>
  <p class="about-desc" data-i18n="aboutHow"></p>
  <p class="about-desc" data-i18n="aboutDesc"></p>
  <p class="about-foss" data-i18n="aboutFoss"></p>
  <div class="about-links">
    <a class="about-link" id="aboutGithub" data-i18n="github">View source on GitHub</a>
    <a class="about-link" id="aboutPrivacy" data-i18n="privacy">Privacy policy</a>
    <button class="about-link" id="aboutShortcut">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M7 14h10"/>
      </svg>
      <span data-i18n="shortcut">Set keyboard shortcut</span>
    </button>
    <button class="about-link about-coffee" id="aboutCoffee">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
      <span data-i18n="coffee">Buy me a coffee</span>
    </button>
  </div>
</div>

<script src="i18n.js"></script>
<script src="presets.js"></script>
<script src="popup.js"></script>
</body>
</html>
